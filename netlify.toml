[build]
  command = "npm install && npm run build"
  publish = "DimphoKeLesegoCateringBackend/wwwroot"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"

[functions]
  node_bundler = "esbuild"
  external_node_modules = ["sqlite3"]
  included_files = [
    "dist/**",
    "DimphoKeLesegoCateringBackend/wwwroot/**",
    "node_modules/sqlite3/**"
  ]

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
